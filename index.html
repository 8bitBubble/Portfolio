<!DOCTYPE html>
<html>
<head>
  <title>My Portfolio</title>
  <style>
    body {font-family:sans-serif; text-align:center; background: #f4f4f4;}
    .card {background: white; padding: 20px; border-radius: 10px; display: inline-block; margin-top: 50px; box-shadow: 0 4px 8px(0,0,0,0.1);}
    button {background: #007bff; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px;}
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello! I'm a future developer.</h1>
    <p>I'm currently learning HTML, CSS, JavaScript, and cybersecurity.</p>
    <p id="message">Current Status: Building the foundation...</p>
    <button onclick="changeStatus()">Click for Goal</button>
  </div>

  <script>
    function changeStatus() {
      document.getElementById('message').innerHTML = "Goal: Become a professional web developer!";
      document.getElementById('message').style.color = "green";
    }
  </script>
<hr>
  <section id="contact-area" style="padding: 20px;">
    <h2>Project 1: Secure Contact</h2>
    <p>Input Validation Proof</p>

    <form id="secureForm" style="max-width: 300px; margin: 0 auto; text-align: left;">
      <label>Email(Required):</label>
      <br>
       <input type="email" id="userEmail" required style="width:100%;">
      <br>
      <br>
        <labe>Your Message(Min 10 characters):</labe>
      <br>
      <textarea id="userMessage" minlength="10" required style="width: 100%;"></textarea><br><br>
      <button type="submit">Submit Securely</button>
    </form>
    <p id="formFeedback" style="front-weight: bold; margin-top: 10px;"></p>
  </section>

  <script>
    //This scipt intercepts the submit button to show validation in action
    document.getElementById('secureForm').onsubmit = function(event) {
      event.preventDefault(); //This stops the page from refreshing
      const email = document.getElementById('userEmail').value;
    document.getElementById('formFeedback').innerHTML = "Entry Validated! Securely sending data for:" + email;
    document.getElementById('formFeedback').style.color = "green";
  </script>
</body>
</html>
